<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Me</title>

<style>

.logo{
position:absolute;
top:5px;
left:25px;
width:200px;
}

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#260642;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#480b7d;
text-align:center;
padding:10px;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

nav a:hover{
color:#00c3ff;
}

.container{
width:60%;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0px 2px 8px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#0a2540;
color:white;
border:none;
padding:12px 20px;
cursor:pointer;
font-size:16px;
border-radius:5px;
}

button:hover{
background:#0077b6;
}

</style>

<script>

function validateForm(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let country=document.getElementById("country").value;
let comments=document.getElementById("comments").value;

if(name=="" || email=="" || country=="" || comments==""){

alert("Please fill in all fields before submitting.");

return false;

}

alert("Form submitted successfully!");

return true;

}

</script>

</head>

<body>

<header>
<img src="justlogo.png" class="logo">
<h1>Contact Me</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="contactpage.html">Contact</a>
</nav>

<div class="container">

<form onsubmit="return validateForm()">

<label>Full Name</label>
<input type="text" id="name">

<label>Email Address</label>
<input type="email" id="email">

<label>Country</label>
<input type="text" id="country">

<label>Comments</label>
<textarea id="comments" rows="5"></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
